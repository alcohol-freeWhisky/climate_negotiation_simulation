    - CBDR-RC
    - common but differentiated responsibilities
    - respective capabilities
  - clause: governance body or committee
    expected: true
    aliases:
    - governance and institutional arrangements
    - institutional arrangements
    - Subsidiary Body for Scientific and Technological Advice
    - SBSTA
  - clause: work programme
    expected: true
    aliases:
    - work programme
    - recommendations on the work programme
  - clause: relationship to Article 6.2 and 6.4
    expected: true
    aliases:
    - Article 6.2
    - Article 6.4
    min_numeric_refs: 1
  - clause: reporting requirements
    expected: true
    aliases:
    - reporting and transparency
    - transparency of activities and outcomes
