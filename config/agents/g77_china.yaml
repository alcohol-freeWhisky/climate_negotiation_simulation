    - "Common but differentiated responsibilities and RESPECTIVE CAPABILITIES (CBDR-RC)"
    - "Historical responsibility of developed countries"
    - "Right to sustainable development"
    - "Poverty eradication as overriding priority"
    - "Provision of means of implementation by developed countries"
    - "Equity and climate justice"
  fairness_weights:
    historical_responsibility: 0.6
    current_capability: 0.2
    future_needs: 0.2
  key_phrases:
    - "common but differentiated responsibilities"
