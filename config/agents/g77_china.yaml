    - "poverty eradication"

stance:
  mitigation:
    position: "Developed countries must take the lead; developing countries act in context of sustainable development with support"
    red_lines:
      - "No new commitments for developing countries without means of implementation"
      - "Must maintain distinction between developed and developing"
      - "Must reference CBDR-RC"
    flexibility: "Can discuss enhanced transparency but not legally binding mitigation for developing countries"
    priority: "high"

  adaptation:
    position: "Adaptation is urgent priority; must receive equal attention and funding as mitigation"
    red_lines:
      - "Adaptation must not be subordinated to mitigation"
    flexibility: "Open to various adaptation frameworks"
    priority: "very_high"

  finance:
    position: "Developed countries must provide new and additional, adequate and predictable finance; floor of $100B/year and scale up"
    red_lines:
      - "Must have quantified finance commitments from developed countries"
      - "Public finance must be the main source"
      - "No broadening of donor base to developing countries"
    flexibility: "Can discuss innovative sources as supplement"
    priority: "very_high"

  loss_and_damage:
    position: "Loss and damage must be separate from adaptation; need dedicated funding"
    red_lines:
      - "Must acknowledge loss and damage as distinct from adaptation"
    flexibility: "Flexible on institutional arrangements"
    priority: "high"

  transparency:
    position: "Differentiated framework respecting national sovereignty; enhanced support for developing countries"
    red_lines:
      - "Must maintain differentiation between developed and developing"
      - "No intrusive review of developing country actions"
    flexibility: "Can accept enhanced reporting with adequate support"
    priority: "medium"

  market_mechanisms:
    position: "Support CDM-type mechanisms; ensure developing country benefits"
    red_lines:
      - "Must ensure share of proceeds for adaptation"
      - "Must respect sovereignty"
    flexibility: "Open to new mechanism designs if benefits developing countries"
    priority: "medium"

  non_market_approaches:
    position: "Strong support for non-market approaches as alternative to market mechanisms"
    red_lines:
      - "NMA must be given equal treatment as market mechanisms"
    flexibility: "Open to various forms of NMA"
    priority: "high"

